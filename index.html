<!DOCTYPE html>
<html>
<head>
    <title>Car Loan Management System</title>

    <style>
        body {
        
    renderTable();
}

function deleteRow(index) {
    deletedRows[index] = history[index];

    const table = document.getElementById("historyTable");
    const row = document.getElementById("row-" + index);

    const deletedRow = document.createElement("tr");
    deletedRow.id = "row-" + index;
    deletedRow.innerHTML = `
        <td colspan="3">Payment History Deleted</td>
        <td>
            <button class="undoBtn" onclick="undoDelete(${index})" title="Undo">
                <img src="https://cdn-icons-png.flaticon.com/512/54/54602.png">
            </button>
        </td>
    `;

    table.replaceChild(deletedRow, row);

    history.splice(index, 1);
    localStorage.setItem("loanHistory", JSON.stringify(history));
}

function undoDelete(index) {
    if (!deletedRows[index]) return;

    history.splice(index, 0, deletedRows[index]);
    delete deletedRows[index];

    localStorage.setItem("loanHistory", JSON.stringify(history));
    renderTable();
}

function renderTable() {
    const table = document.getElementById("historyTable");
    table.innerHTML = "";

    history.forEach((r, index) => {
        const row = document.createElement("tr");
        row.id = "row-" + index;
        row.innerHTML = `
            <td>${r.date}</td>
            <td>RM ${format(r.payment)}</td>
            <td>RM ${format(r.remaining)}</td>
            <td>
                <button class="deleteBtn" onclick="deleteRow(${index})" title="Delete">
                    <img src="https://cdn-icons-png.flaticon.com/512/1214/1214428.png">
                </button>
            </td>
        `;
        table.appendChild(row);
    });

    document.getElementById("outstanding").value = format(outstanding);
}

function resetData() {
    if (confirm("Reset all data?")) {
        localStorage.clear();
        history = [];
        deletedRows = {};
        outstanding = 57504.31;
        renderTable();
    }
}

renderTable();
</script>

</body>
</html>
