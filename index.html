<!DOCTYPE html>
<html>
<head>
    <title>Car Loan Management System</title>

    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: 40px auto;
        }

        input, button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            font-size: 15px;
        }

        input[readonly] {
            background-color: #f5f5f5;
            font-weight: bold;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #f0f0f0;
        }

        .deleteBtn {
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .deleteBtn img {
            width: 20px;
        }
    </style>
</head>

<body>

<h2>Car Loan Management System</h2>

<p><strong>Current Date:</strong> <span id="currentDate"></span></p>

<label>Outstanding (RM):</label>
<input type="text" id="outstanding" readonly>

<label>Payment (RM):</label>
<input type="text" id="payment" placeholder="Enter payment amount">

<button onclick="makePayment()">Make Payment</button>

<h3>Payment History</h3>

<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Payment</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="historyTable"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    query,
    orderBy,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyCe185glXDN4rh5XeagVMLGjSxcg6g2ZQI",
  authDomain: "oplord-carloan.firebaseapp.com",
  projectId: "oplord-carloan",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== SETTINGS =====
const INITIAL_LOAN = 57504.31;

let history = [];
let outstanding = INITIAL_LOAN;

// ===== UTIL =====
function format(num) {
    return Number(num).toLocaleString('en-MY', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function getCurrentDate() {
    return new Date().toLocaleDateString('en-MY');
}

document.getElementById("currentDate").innerText = getCurrentDate();

// ===== LOAD =====
async function loadData() {
    const q = query(collection(db, "loanHistory"), orderBy("timestamp"));
    const snapshot = await getDocs(q);

    history = [];

    snapshot.forEach(docSnap => {
        history.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    // ✅ Recalculate outstanding (BEST METHOD)
    outstanding = INITIAL_LOAN;

    history.forEach(r => {
        outstanding -= r.payment;
    });

    renderTable();
}

// ===== ADD =====
window.makePayment = async function () {
    let payment = parseFloat(document.getElementById("payment").value);

    if (isNaN(payment) || payment <= 0) {
        alert("Invalid payment");
        return;
    }

    if (payment > outstanding) {
        alert("Payment exceeds outstanding");
        return;
    }

    await addDoc(collection(db, "loanHistory"), {
        date: getCurrentDate(),
        payment: payment,
        timestamp: serverTimestamp()
    });

    document.getElementById("payment").value = "";

    loadData();
};

// ===== DELETE =====
window.deleteRow = async function (index) {
    const record = history[index];

    await deleteDoc(doc(db, "loanHistory", record.id));

    loadData();
};

// ===== RENDER =====
function renderTable() {
    const table = document.getElementById("historyTable");
    table.innerHTML = "";

    history.forEach((r, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${r.date}</td>
            <td>RM ${format(r.payment)}</td>
            <td>
                <button class="deleteBtn" onclick="deleteRow(${index})">
                    <img src="https://cdn-icons-png.flaticon.com/512/1214/1214428.png">
                </button>
            </td>
        `;

        table.appendChild(row);
    });

    document.getElementById("outstanding").value = format(outstanding);
}

// INIT
loadData();

</script>

</body>
</html>
