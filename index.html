<!DOCTYPE html>
<html>
<head>
    <title>Car Loan Management System</title>

    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: 40px auto;
        }

        input, button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            font-size: 15px;
        }

        input[readonly] {
            background-color: #f5f5f5;
            font-weight: bold;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th, td {
            padding: 8px;
            text-align: center;
        }

        th {
            background: #f0f0f0;
        }

        th:nth-child(4), td:nth-child(4) {
            width: 60px;
        }

        .deleteBtn {
            border: none;
            background: transparent;
            cursor: pointer;
            width: 36px;
            height: 36px;
        }

        .deleteBtn img {
            width: 20px;
        }

        .dateBox {
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<h2>Car Loan Management System</h2>

<div class="dateBox">
    Current Date: <span id="currentDate"></span>
</div>

<label>Outstanding (RM):</label>
<input type="text" id="outstanding" readonly>

<label>Payment (RM):</label>
<input type="text" id="payment" placeholder="Enter payment amount">

<button onclick="makePayment()">Make Payment</button>

<h3>Payment History</h3>

<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Payment</th>
            <th>Outstanding After Payment</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="historyTable"></tbody>
</table>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    addDoc, 
    getDocs, 
    deleteDoc, 
    doc,
    query,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 REPLACE THIS WITH YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe185glXDN4rh5XeagVMLGjSxcg6g2ZQI",
  authDomain: "oplord-carloan.firebaseapp.com",
  projectId: "oplord-carloan",
  storageBucket: "oplord-carloan.firebasestorage.app",
  messagingSenderId: "484543734858",
  appId: "1:484543734858:web:9aeb6d9c7011e3c4f2f2b3",
  measurementId: "G-D0NXWNX169"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== APP LOGIC =====

let history = [];
let outstanding = 57504.31;

// Format currency
function format(num) {
    return Number(num).toLocaleString('en-MY', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

// Date
function getCurrentDate() {
    return new Date().toLocaleDateString('en-MY');
}

document.getElementById("currentDate").innerText = getCurrentDate();

// ===== LOAD DATA =====
async function loadFromFirestore() {
    const q = query(collection(db, "loanHistory"), orderBy("date"));

    const snapshot = await getDocs(q);

    history = [];

    snapshot.forEach(docSnap => {
        history.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    if (history.length > 0) {
        outstanding = history[history.length - 1].remaining;
    }

    renderTable();
}

// ===== ADD PAYMENT =====
window.makePayment = async function () {
    let paymentInput = document.getElementById("payment").value;
    let payment = parseFloat(paymentInput.replace(/,/g, ''));

    if (isNaN(payment) || payment <= 0) {
        alert("Invalid payment amount");
        return;
    }

    if (payment > outstanding) {
        alert("Payment exceeds outstanding");
        return;
    }

    outstanding -= payment;

    const record = {
        date: getCurrentDate(),
        payment: payment,
        remaining: outstanding
    };

    await addDoc(collection(db, "loanHistory"), record);

    document.getElementById("payment").value = "";

    loadFromFirestore();
};

// ===== DELETE =====
window.deleteRow = async function (index) {
    const record = history[index];

    await deleteDoc(doc(db, "loanHistory", record.id));

    loadFromFirestore();
};

// ===== RENDER =====
function renderTable() {
    const table = document.getElementById("historyTable");
    table.innerHTML = "";

    history.forEach((r, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${r.date}</td>
            <td>RM ${format(r.payment)}</td>
            <td>RM ${format(r.remaining)}</td>
            <td>
                <button class="deleteBtn" onclick="deleteRow(${index})">
                    <img src="https://cdn-icons-png.flaticon.com/512/1214/1214428.png">
                </button>
            </td>
        `;

        table.appendChild(row);
    });

    document.getElementById("outstanding").value = format(outstanding);
}

// INITIAL LOAD
loadFromFirestore();

</script>

</body>
</html>
