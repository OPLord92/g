<!DOCTYPE html>
<html>
<head>
    <title>Car Loan Management System</title>

    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: 40px auto;
        }

        input, button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            font-size: 15px;
        }

        input[readonly] {
            background-color: #f5f5f5;
            font-weight: bold;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #f0f0f0;
        }

        .btn {
            border: none;
            cursor: pointer;
            padding: 6px 10px;
        }

        .deleteBtn {
            background: transparent;
        }

        .undoBtn {
            background: orange;
            color: white;
        }

        .deletedRow {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Car Loan Management System</h2>

<p><strong>Current Date:</strong> <span id="currentDate"></span></p>

<label>Outstanding (RM):</label>
<input type="text" id="outstanding" readonly>

<label>Payment (RM):</label>
<input type="text" id="payment" placeholder="Enter payment amount">

<button onclick="makePayment()">Make Payment</button>

<h3>Payment History</h3>

<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Payment</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="historyTable"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    query,
    orderBy,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe185glXDN4rh5XeagVMLGjSxcg6g2ZQI",
  authDomain: "oplord-carloan.firebaseapp.com",
  projectId: "oplord-carloan",
  storageBucket: "oplord-carloan.firebasestorage.app",
  messagingSenderId: "484543734858",
  appId: "1:484543734858:web:9aeb6d9c7011e3c4f2f2b3",
  measurementId: "G-D0NXWNX169"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== SETTINGS =====
const INITIAL_LOAN = 57517.55;

let history = [];
let outstanding = INITIAL_LOAN;
let deletedCache = {};

// ===== UTIL =====
function format(num) {
    return Number(num).toLocaleString('en-MY', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function getCurrentDate() {
    return new Date().toLocaleDateString('en-MY');
}

document.getElementById("currentDate").innerText = getCurrentDate();

// ===== LOAD =====
async function loadData() {
    const q = query(collection(db, "loanHistory"), orderBy("timestamp"));
    const snapshot = await getDocs(q);

    history = [];

    snapshot.forEach(docSnap => {
        history.push({
            id: docSnap.id,
            ...docSnap.data(),
            deleted: false
        });
    });

    recalcOutstanding();
    renderTable();
}

// ===== RECALCULATE =====
function recalcOutstanding() {
    outstanding = INITIAL_LOAN;

    history.forEach(r => {
        if (!r.deleted) {
            outstanding -= r.payment;
        }
    });

    document.getElementById("outstanding").value = format(outstanding);
}

// ===== ADD PAYMENT =====
window.makePayment = async function () {
    let payment = parseFloat(document.getElementById("payment").value);

    if (isNaN(payment) || payment <= 0) {
        alert("Invalid payment");
        return;
    }

    if (payment > outstanding) {
        alert("Payment exceeds outstanding");
        return;
    }

    await addDoc(collection(db, "loanHistory"), {
        date: getCurrentDate(),
        payment: payment,
        timestamp: serverTimestamp()
    });

    document.getElementById("payment").value = "";
    loadData();
};

// ===== DELETE (SOFT) =====
window.deleteRow = function (index) {
    history[index].deleted = true;
    deletedCache[index] = history[index];

    recalcOutstanding();
    renderTable();
};

// ===== UNDO =====
window.undoDelete = function (index) {
    if (!deletedCache[index]) return;

    history[index].deleted = false;
    delete deletedCache[index];

    recalcOutstanding();
    renderTable();
};

// ===== OPTIONAL: PERMANENT DELETE =====
window.confirmDelete = async function (index) {
    const record = history[index];
    await deleteDoc(doc(db, "loanHistory", record.id));
    loadData();
};

// ===== RENDER =====
function renderTable() {
    const table = document.getElementById("historyTable");
    table.innerHTML = "";

    history.forEach((r, index) => {
        const row = document.createElement("tr");

        if (r.deleted) {
            row.classList.add("deletedRow");
            row.innerHTML = `
                <td colspan="2">Payment Deleted</td>
                <td>
                    <button class="btn undoBtn" onclick="undoDelete(${index})">Undo</button>
                </td>
            `;
        } else {
            row.innerHTML = `
                <td>${r.date}</td>
                <td>RM ${format(r.payment)}</td>
                <td>
                    <button class="btn deleteBtn" onclick="deleteRow(${index})">🗑</button>
                </td>
            `;
        }

        table.appendChild(row);
    });
}

// INIT
loadData();

</script>

</body>
</html>
