<!DOCTYPE html>
<html>
<head>
    <title>Car Loan Management System (FIXED)</title>

    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: 40px auto;
        }

        input, button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            font-size: 15px;
        }

        input[readonly] {
            background-color: #f5f5f5;
            font-weight: bold;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th, td {
            padding: 8px;
            text-align: center;
        }

        th {
            background: #f0f0f0;
        }

        .deleteBtn {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
        }

        .dateBox {
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<h2>Car Loan Management System (Firebase FIXED)</h2>

<div class="dateBox">
    Current Date: <span id="currentDate"></span>
</div>

<label>Outstanding (RM):</label>
<input type="text" id="outstanding" readonly>

<label>Payment (RM):</label>
<input type="text" id="payment" placeholder="Enter payment amount">

<button onclick="makePayment()">Make Payment</button>
<button onclick="resetData()">Reset All Data</button>

<h3>Payment History</h3>

<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Payment</th>
            <th>Remaining</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="historyTable"></tbody>
</table>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getDatabase,
    ref,
    set,
    push,
    onValue,
    remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* 🔥 YOUR FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyCe185glXDN4rh5XeagVMLGjSxcg6g2ZQI",
  authDomain: "oplord-carloan.firebaseapp.com",
  projectId: "oplord-carloan",
  storageBucket: "oplord-carloan.firebasestorage.app",
  messagingSenderId: "484543734858",
  appId: "1:484543734858:web:9aeb6d9c7011e3c4f2f2b3",
  measurementId: "G-D0NXWNX169"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= DATA ================= */
let history = [];
let outstanding = 57517.55;

/* ================= UI ================= */
function format(num) {
    return Number(num).toLocaleString('en-MY', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function getCurrentDate() {
    return new Date().toLocaleDateString('en-MY');
}

document.getElementById("currentDate").innerText = getCurrentDate();

/* ================= FIXED LOAD ================= */
function loadData() {

    const outRef = ref(db, "loan/outstanding");
    const histRef = ref(db, "loan/history");

    // OUTSTANDING
    onValue(outRef, (snap) => {

        if (snap.exists()) {
            outstanding = snap.val();
        } else {
            outstanding = 57517.55;
            set(outRef, outstanding);
        }

        document.getElementById("outstanding").value = format(outstanding);
    });

    // HISTORY
    onValue(histRef, (snap) => {

        history = [];

        if (snap.exists()) {
            const data = snap.val();

            Object.keys(data).forEach(key => {
                history.push({
                    id: key,
                    ...data[key]
                });
            });
        }

        renderTable();
    });
}

/* ================= SAVE OUTSTANDING ================= */
function saveOutstanding() {
    set(ref(db, "loan/outstanding"), outstanding);
}

/* ================= PAYMENT ================= */
window.makePayment = function () {

    let payment = parseFloat(
        document.getElementById("payment").value.replace(/,/g, '')
    );

    if (isNaN(payment) || payment <= 0) {
        alert("Invalid payment");
        return;
    }

    if (payment > outstanding) {
        alert("Payment exceeds outstanding");
        return;
    }

    outstanding -= payment;

    let record = {
        date: getCurrentDate(),
        payment: payment,
        remaining: outstanding
    };

    push(ref(db, "loan/history"), record);

    saveOutstanding();

    document.getElementById("payment").value = "";
};

/* ================= DELETE ================= */
window.deleteRow = function (id) {
    if (confirm("Delete this record?")) {
        remove(ref(db, "loan/history/" + id));
    }
};

/* ================= RESET ================= */
window.resetData = function () {
    if (confirm("Reset ALL data?")) {
        remove(ref(db, "loan"));
        outstanding = 57517.55;
        document.getElementById("outstanding").value = format(outstanding);
    }
};

/* ================= TABLE ================= */
function renderTable() {
    const table = document.getElementById("historyTable");
    table.innerHTML = "";

    history.forEach(r => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${r.date}</td>
            <td>RM ${format(r.payment)}</td>
            <td>RM ${format(r.remaining)}</td>
            <td>
                <button class="deleteBtn" onclick="deleteRow('${r.id}')">🗑️</button>
            </td>
        `;

        table.appendChild(row);
    });
}

/* ================= START ================= */
loadData();

</script>

</body>
</html>
